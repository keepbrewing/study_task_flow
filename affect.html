<!DOCTYPE html>
<html>

<head>
    <script src="./js/guard.js"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Affect Game</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./css/style.css">
</head>

<body class="bg-[#F7FBFF] text-slate-800 min-h-screen">

    <!-- background -->
    <div class="absolute inset-0 -z-10 pointer-events-none">
        <svg viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice" class="w-full h-full">
            <circle cx="200" cy="200" r="180" fill="#E6F4FF" />
            <circle cx="1200" cy="150" r="220" fill="#FFF1CC" />
            <circle cx="1000" cy="650" r="260" fill="#E9FFF3" />
            <circle cx="300" cy="700" r="240" fill="#FFEAF1" />
        </svg>
    </div>

    <div class="max-w-[75vh] mx-auto px-6 py-8">

        <div id="affect-container" class="bg-white/90 backdrop-blur rounded-3xl p-8 shadow-md
             flex flex-col items-center text-center space-y-8">

            <!-- PROBLEM IMAGE -->
            <img id="affect-image" src="./assets/images/target.png" class="rounded-2xl shadow-md max-w-xs">

            <!-- PROMPT TEXT -->
            <div id="affect-prompt" class="text-xl text-slate-700 leading-relaxed">
                ...
            </div>

            <!-- INPUT AREA (changes every stage) -->
            <div id="affect-input" class="flex flex-col items-center gap-4">

                <button id="record-btn" class="bg-[#FF9EC7] text-white px-8 py-3 rounded-full font-semibold">
                    &#128308; Start Recording
                </button>

                <button id="stop-btn" class="bg-slate-400 text-white px-8 py-3 rounded-full font-semibold hidden">
                    &#9642;&#65039; Stop Recording
                </button>

                <div id="record-status" class="text-slate-500 text-sm"></div>

            </div>

            <!-- AUDIO BUTTON -->
            <button id="affect-audio-btn" class="bg-[#E6F4FF] text-[#3A8DDE]
               px-6 py-3 rounded-full font-semibold shadow-sm">
                &#128266; Hear again
            </button>

        </div>

    </div>

    <script type="module" src="./js/affect.js"></script>

</body>

</html>
